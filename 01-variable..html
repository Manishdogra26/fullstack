<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variables</title>
</head>
<body>
    <script>
        let variable1=3;
        
         console.log(variable1);
         let calculation=2+2;
         console.log(calculation+2);

         let result = calculation+2
         console.log(result+2);

         let message='hello';
         console.log(message);

         variable1=5;
         console.log(variable1);

         variable1= variable1+1
         console.log(variable1)

         const variable2=3; //we can not change the value like let 

         var variable3=3; //it can change later but have some issue 

         console.log(typeof variable2)
         console.log(typeof message)
    </script>
    
</html>
